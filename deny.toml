# cargo-deny configuration. Run: cargo deny check

[advisories]
yanked = "deny"
ignore = []

[licenses]
# Permissive (and public-domain-equivalent) licenses we accept. Crates offering
# a choice (e.g. "Unlicense OR MIT") are satisfied via one of these.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
wildcards = "deny"
allow-wildcard-paths = true
# Fail on unexpected duplicate versions, but accept the few that the upstream
# dependency tree pulls in transitively and we cannot deduplicate ourselves.
multiple-versions = "deny"
skip = [
    { crate = "hashbrown" },
    { crate = "thiserror" },
    { crate = "thiserror-impl" },
    { crate = "windows-sys" },
    # lettre (email parsing) pulls nom 8 while x509-parser is still on nom 7.
    { crate = "nom" },
    # hickory-resolver 0.26 (DNS monitors) is on rand 0.10 / getrandom 0.4 /
    # cpufeatures 0.3 and the matching wasi/efi shims, while the rest of the
    # ecosystem (governor, sqlx, sha2, ring) still rides the previous majors.
    # Its system-configuration dep is likewise a core-foundation behind.
    { crate = "rand" },
    { crate = "rand_core" },
    { crate = "getrandom" },
    { crate = "cpufeatures" },
    { crate = "core-foundation" },
    { crate = "r-efi" },
    { crate = "wit-bindgen" },
    # We use sha2 0.11 (cert pinning) for its fixes going forward; sqlx still
    # pins the 0.10 line.
    { crate = "sha2" },
    # sha2 0.11 is on the digest 0.11 / block-buffer 0.11 stack; sqlx's 0.10
    # still pulls the previous majors of the same RustCrypto crates.
    { crate = "digest" },
    { crate = "block-buffer" },
    { crate = "crypto-common" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
